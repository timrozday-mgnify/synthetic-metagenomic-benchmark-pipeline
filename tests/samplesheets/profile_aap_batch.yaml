# Batched aap profiling: A1+A2 share the (empty) DB config -> ONE RUN_AAP task;
# A3 names a different `database` -> its own RUN_AAP. Verifies grouping by DB, and
# that samples reusing the same read files (all point at tests/data) don't collide.
- sample: A1
  profiler: aap
  benchmark_dir: tests/data
  database:

- sample: A2
  profiler: aap
  benchmark_dir: tests/data
  database:

- sample: A3
  profiler: aap
  benchmark_dir: tests/data
  database: other_db
