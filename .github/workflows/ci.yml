name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: latest-stable

      - uses: pre-commit/action@v3.0.1

  bin-tests:
    name: bin/ unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run bin tests
        run: |
          pip install pytest
          pytest tests/bin/test_bin.py -v

  nf-test-stub:
    name: nf-test (stub, no images)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: latest-stable

      - name: Setup nf-test
        uses: nf-core/setup-nf-test@v1.3.6
        with:
          version: "0.9.4"

      # Stub tests run on the host (no container engine) so they need no images.
      - name: Run stub tests
        run: >
          nf-test test modules/ tests/default.nf.test --ci --tag stub
          --junitxml=stub-test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nf-test-stub-results
          path: "*-test-results.xml"
