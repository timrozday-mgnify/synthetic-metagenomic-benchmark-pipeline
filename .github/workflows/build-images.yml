name: Build container images

# Builds the smb-skiver and smb-genome-blender images from the vendored
# submodules and pushes them to GHCR. The images bundle the (public) skiver and
# genome-blender source; the resulting packages are published publicly so HPC
# pulls need no authentication.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: smb-skiver
            dockerfile: containers/skiver/Dockerfile
          - image: smb-genome-blender
            dockerfile: containers/genome-blender/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # Single-platform, no attestations: buildx defaults attach provenance/SBOM
          # attestations that make the pushed ref an OCI index with an `unknown/unknown`
          # manifest, which Singularity/Apptainer fails to convert to SIF
          # ("unexpected end of JSON input"). Keep the manifest a plain single image.
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ghcr.io/timrozday-mgnify/${{ matrix.image }}:latest
            ghcr.io/timrozday-mgnify/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
